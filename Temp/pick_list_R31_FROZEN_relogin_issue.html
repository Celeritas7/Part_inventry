<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピックリスト生成</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#2563eb;--pri-dk:#1e40af;--pri-bg:rgba(37,99,235,.08);--pri-bg2:rgba(37,99,235,.14);--grn:#059669;--grn-bg:rgba(5,150,105,.08);--card:#fff;--t1:#1e293b;--t2:#64748b;--t3:#94a3b8;--brd:#e2e8f0;--focus:#2563eb;--ok-bg:#f0fdf4;--ok:#15803d;--ok-brd:#bbf7d0;--err-bg:#fef2f2;--err:#b91c1c;--err-brd:#fecaca;--miss:#fef9c3;--r:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;min-height:100vh;color:var(--t1)}
.shell{max-width:960px;margin:0 auto;padding:16px}
.bar{background:#fff;border-radius:var(--r);padding:14px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.bar-left{display:flex;align-items:center;gap:10px}
.bar h1{font-size:1.1rem;font-weight:700}
.nbtn{background:var(--pri-bg);border:none;border-radius:8px;padding:6px 12px;font-size:.85rem;cursor:pointer;color:var(--pri);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.nbtn:hover{background:var(--pri-bg2)}
.bar-right{display:flex;align-items:center;gap:8px}
.chip{font-size:.8rem;color:var(--t2);background:#f8fafc;padding:4px 10px;border-radius:20px;border:1px solid var(--brd)}
.chip .rt{font-weight:600;color:var(--pri);margin-left:4px}
.lbtn{background:none;border:1px solid var(--brd);color:var(--t2);padding:5px 10px;border-radius:6px;font-size:.75rem;cursor:pointer}
.lbtn:hover{border-color:var(--pri);color:var(--pri)}
.bread{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:.85rem;color:var(--t2);flex-wrap:wrap}
.bread a{color:var(--pri);text-decoration:none;cursor:pointer;font-weight:600}.bread a:hover{text-decoration:underline}
.bread .sep{color:var(--t3)}
.card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.shdr h2{font-size:1.05rem;font-weight:700}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-dk)}
.btn-g{background:var(--grn);color:#fff}.btn-g:hover{background:#047857}
.btn-s{background:var(--pri-bg);color:var(--pri)}.btn-s:hover{background:var(--pri-bg2)}
.btn-d{background:var(--err-bg);color:var(--err)}.btn-d:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:.8rem}
.spinner{border:3px solid #e2e8f0;border-top:3px solid var(--pri);border-radius:50%;width:36px;height:36px;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
#login-section{text-align:center;padding:40px 20px}
#login-section p{color:var(--t2);margin-bottom:20px}
.login-btn{background:var(--pri);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600}
.login-btn:hover{background:var(--pri-dk)}
#login-error{color:var(--err);margin-top:14px;display:none;white-space:pre-line;font-size:.9rem}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.folder-card{border:2px solid var(--brd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .15s}
.folder-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.folder-card .ico{font-size:2.5rem;margin-bottom:8px}
.folder-card h3{font-size:.95rem;font-weight:700;margin-bottom:4px}
.folder-card p{font-size:.78rem;color:var(--t3)}
.folder-acts{display:flex;gap:4px;justify-content:center;margin-top:8px}
.li{border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;transition:border-color .15s;cursor:pointer}
.li:hover{border-color:var(--pri)}
.li-info h3{font-size:.9rem;font-weight:600;margin-bottom:2px}
.li-info p{font-size:.78rem;color:var(--t3)}
.li-info .tag{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:600;margin-right:4px}
.tag-tpl{background:#d1fae5;color:#065f46}.tag-gen{background:#dbeafe;color:#1e40af}.tag-spec{background:#e0e7ff;color:#3730a3;font-family:monospace}
.li-acts{display:flex;gap:6px}
.empty{text-align:center;padding:40px;color:var(--t3)}.empty .ico{font-size:2rem;margin-bottom:8px}
.quick-box{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;border-radius:12px;padding:20px;margin-bottom:16px}
.quick-box h3{font-size:.95rem;font-weight:700;color:var(--pri);margin-bottom:12px}
.quick-row{display:flex;gap:8px;margin-bottom:10px}
.quick-row input{flex:1;padding:12px 14px;border:2px solid var(--pri);border-radius:8px;font-size:1rem;font-weight:600;font-family:monospace}
.quick-row input:focus{outline:none;border-color:var(--pri-dk)}
.batch-area{width:100%;padding:10px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:.9rem;font-family:monospace;min-height:80px;resize:vertical}
.batch-area:focus{outline:none;border-color:var(--focus)}
.quick-hint{font-size:.78rem;color:var(--t2);margin-top:6px}
.efl{margin-bottom:16px}.efl label{display:block;font-size:.8rem;font-weight:600;color:var(--t2);margin-bottom:6px}
.efl input,.efl select,.efl textarea{width:100%;padding:10px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:.9rem}
.efl input:focus,.efl select:focus,.efl textarea:focus{outline:none;border-color:var(--focus)}
.efl-row{display:flex;gap:12px;flex-wrap:wrap}.efl-row .efl{flex:1;min-width:140px}
.rule-card{border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.rule-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8fafc;border-bottom:1px solid var(--brd)}
.rule-header input{border:none;background:transparent;font-size:.85rem;font-weight:700;flex:1;padding:2px 4px}
.rule-header input:focus{outline:none;background:#fff;border-radius:4px}
.rule-body{padding:14px}
.stbl{width:100%;border-collapse:collapse;font-size:.83rem}
.stbl th{text-align:left;font-size:.72rem;font-weight:600;color:var(--t3);text-transform:uppercase;padding:6px 8px;border-bottom:2px solid var(--brd)}
.stbl td{padding:5px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.stbl input{padding:5px 7px;border:1.5px solid var(--brd);border-radius:6px;font-size:.83rem;width:100%}
.stbl input:focus{outline:none;border-color:var(--focus)}
.stbl .pn-in{font-family:monospace;font-weight:500}
.stbl .qty-in{width:55px;text-align:center}
.stbl .form-in{font-family:monospace;font-size:.8rem;background:#eff6ff;color:var(--pri);font-weight:500}
.stbl .act{width:30px;text-align:center}
.stbl .dbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.9rem}.stbl .dbtn:hover{color:var(--err)}
.add-row{padding:6px;width:100%;border:none;background:#fafbfc;color:var(--pri);font-size:.82rem;font-weight:600;cursor:pointer;border-top:1px solid var(--brd)}.add-row:hover{background:var(--pri-bg)}
.formula-help{font-size:.75rem;color:var(--t2);background:#f8fafc;padding:8px 12px;border-radius:6px;margin-top:8px}
.formula-help code{background:#e0e7ff;padding:1px 4px;border-radius:3px;font-size:.75rem}
.gen-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:14px 16px;background:var(--pri-bg);border-radius:var(--r)}
.gen-bar label{font-size:.85rem;font-weight:600}
.gen-bar input[type="number"]{width:70px;padding:8px 10px;border:1.5px solid var(--brd);border-radius:8px;font-size:1rem;text-align:center;font-weight:600}
.gen-bar input:focus{outline:none;border-color:var(--focus)}
.ph{margin-bottom:16px}.ph h2{font-size:1.15rem;font-weight:700;margin-bottom:4px}
.ph .meta{font-size:.85rem;color:var(--t2);display:flex;gap:16px;flex-wrap:wrap}
.pt{width:100%;border-collapse:collapse;font-size:.85rem}
.pt th{text-align:left;padding:8px 10px;background:#f8fafc;border:1px solid var(--brd);font-weight:700;font-size:.76rem;text-transform:uppercase;color:var(--t2)}
.pt td{padding:8px 10px;border:1px solid var(--brd)}
.pt .ck{width:32px;text-align:center}.pt .ck input{width:15px;height:15px;cursor:pointer}
.pt .nm{width:32px;text-align:center;color:var(--t3);font-weight:600}
.pt .pnc{font-family:monospace;font-weight:500;white-space:nowrap}
.pt .qc{width:55px;text-align:center;font-weight:600}
.pt .miss{background:var(--miss)}
.pt .miss-in{background:var(--miss);border:1px dashed #d4a017;padding:3px 5px;border-radius:4px;font-size:.83rem;width:100%}
.pt .cmt{color:var(--t2);font-size:.78rem;font-style:italic}
.pt tr.sec-row td{background:var(--pri);color:#fff;font-weight:700;font-size:.83rem;padding:5px 10px}
.pt tr.sel-row{background:rgba(37,99,235,.06)}.pt tr.sel-row td{border-color:rgba(37,99,235,.2)}
.pt tr.excl-row{opacity:.35;text-decoration:line-through}
.pt tr.excl-row td{background:#f8f8f8}
.excl-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:2px 4px;border-radius:4px}
.excl-btn:hover{background:#f0f0f0}
.pt .ck input{accent-color:var(--pri)}
.sel-all-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f8fafc;border:1px solid var(--brd);border-radius:8px;margin-bottom:12px}
.sel-all-bar label{font-size:.82rem;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px}
.sel-all-bar input{width:17px;height:17px;accent-color:var(--pri);cursor:pointer}
.sel-count-label{font-size:.82rem;color:var(--pri);font-weight:600}
.req-panel{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:2px solid #bfdbfe;border-radius:12px;padding:16px;margin-bottom:16px;display:none}
.req-panel.active{display:block}
.req-panel h3{font-size:.9rem;font-weight:700;color:var(--pri);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.req-badge{background:var(--pri);color:#fff;padding:2px 8px;border-radius:12px;font-size:.78rem}
.req-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.req-field{flex:1;min-width:140px}
.req-field label{display:block;font-size:.72rem;font-weight:600;color:var(--t2);margin-bottom:4px}
.req-field select,.req-field input{width:100%;padding:8px 10px;border:1.5px solid var(--brd);border-radius:6px;font-size:.88rem}
.req-field select:focus,.req-field input:focus{outline:none;border-color:var(--pri)}
.req-inline{display:flex;gap:4px}
.req-inline input{flex:1;min-width:0}
.req-preview{margin-top:10px;border:1px solid var(--brd);border-radius:8px;overflow:hidden;max-height:180px;overflow-y:auto}
.rp-tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.rp-tbl th{text-align:left;padding:5px 8px;background:#f8fafc;border-bottom:1px solid var(--brd);font-size:.72rem;font-weight:600;color:var(--t3);text-transform:uppercase}
.rp-tbl td{padding:5px 8px;border-bottom:1px solid #f5f5f5}
.rp-tbl .pn{font-family:monospace;font-weight:500}
.req-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.status{padding:10px 14px;border-radius:8px;margin-top:12px;text-align:center;font-size:.9rem;display:none}
.status.success{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-brd);display:block}
.status.error{background:var(--err-bg);color:var(--err);border:1px solid var(--err-brd);display:block}
.status.loading{background:var(--pri-bg);color:var(--pri);display:block}
@media print{
    body{background:#fff}
    .bar,.gen-bar,.no-print,.bread,.req-panel,.sel-all-bar{display:none!important}
    .shell{max-width:100%;padding:0}.card{box-shadow:none;padding:0;border-radius:0}
    .pt{font-size:9pt}
    .pt th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pt .miss,.pt .miss-in{background:#fef9c3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pt tr.sec-row td{background:#333!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .pt th.no-print,.pt td.no-print{display:none!important}
}
/* Unit S/N Modal */
.req-unit-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.req-unit-overlay.active{display:flex}
.req-unit-modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px}
.req-unit-chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
.req-unit-chip{padding:8px 12px;border:2px solid var(--brd);border-radius:18px;background:#f9f9f9;font-size:.82rem;cursor:pointer;transition:all .15s}
.req-unit-chip:hover{border-color:var(--t3)}
.req-unit-chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
@page{margin:8mm}
body.print-no-header-footer @page{margin-top:5mm;margin-bottom:5mm}
@media(max-width:600px){.shell{padding:10px}.bar{padding:12px 14px}.card{padding:14px}.shdr{flex-direction:column;align-items:flex-start}.folder-grid{grid-template-columns:1fr 1fr}.li{flex-direction:column;align-items:flex-start;gap:8px}.li-acts{width:100%}.li-acts .btn{flex:1;justify-content:center}.gen-bar{flex-direction:column;align-items:flex-start}.quick-row{flex-direction:column}.efl-row{flex-direction:column}.req-row{flex-direction:column}.req-actions{flex-direction:column}.req-actions .btn{width:100%;justify-content:center}}
    </style>
</head>
<body>
<div class="shell">
    <div class="bar">
        <div class="bar-left">
            <a href="index.html" class="nbtn">📦 出庫依頼</a>
            <h1 id="pg-title">📋 ピックリスト</h1>
        </div>
        <div class="bar-right" id="bar-right" style="display:none">
            <span class="chip" id="user-chip"></span>
            <button class="lbtn" onclick="handleLogout()">ログアウト</button>
        </div>
    </div>
    <div class="bread" id="breadcrumb"></div>
    <div class="card" id="loading-section"><div style="text-align:center;padding:40px"><div class="spinner"></div><p style="color:var(--t3)">読み込み中...</p></div></div>
    <div class="card" id="login-section" style="display:none"><div style="text-align:center;padding:30px"><p>Googleアカウントでログインしてください</p><button class="login-btn" onclick="handleGoogleLogin()">Googleでログイン</button><p id="login-error"></p></div></div>
    <div id="v-folders" style="display:none"></div>
    <div id="v-folder" style="display:none"></div>
    <div id="v-tpl-editor" style="display:none"></div>
    <div id="v-print" style="display:none"></div>
</div>
<script>
// =====================================================
// CONFIG
// =====================================================
const SB_URL='https://wylxvmkcrexwfpjpbhyy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak';
const T={FOLDERS:'part_inventry_app_folders',TEMPLATES:'part_inventry_app_templates',GENERATED:'part_inventry_app_generated_lists',PARTS:'master_parts_list_all',ROLES:'authentication_mode_user_roles'};

// Google Identity Services config (same client as Ghost Tracker)
const GIS_CLIENT_ID='1088099187141-ut0dn0scqt3h99htf3rg8gsrg2oo1ad8.apps.googleusercontent.com';
const GIS_SCOPES='https://www.googleapis.com/auth/spreadsheets';
let gisTokenClient=null;
let sheetsToken=localStorage.getItem('gis_sheets_token')||null;

if(!window.supabase||!window.supabase.createClient){document.getElementById('loading-section').innerHTML='<div style="text-align:center;padding:40px;color:#b91c1c;">SDK読み込み失敗。リロードしてください。</div>';throw new Error('SDK fail');}
const sb=window.supabase.createClient(SB_URL,SB_KEY,{
    auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'sb-wylxvmkcrexwfpjpbhyy-auth-token'}
});

// =====================================================
// STATE
// =====================================================
let user=null; // {email,name,role,isAdmin}
let folders=[],templates=[],generatedLists=[],partsCache=null;
let currentView='loading',currentFolderId=null,currentTplId=null;
let editTpl=null,printData=null,authReady=false;
let reqSelection=[]; // indices of selected print items
let reqExcluded=new Set(); // indices of rows excluded from submission

// =====================================================
// AUTH
// =====================================================
window.onload=function(){
    sb.auth.onAuthStateChange(async(ev,session)=>{
        if(session&&session.user&&(ev==='SIGNED_IN'||ev==='TOKEN_REFRESHED'||ev==='INITIAL_SESSION')){
            await checkRole(session.user);authReady=true;
        }
        else if(ev==='SIGNED_OUT'||(ev==='INITIAL_SESSION'&&!session)){user=null;authReady=true;showAuth('login');}
    });
    setTimeout(()=>{if(!authReady)showAuth('login');},4000);
    // Initialize Google Identity Services for Sheets API
    initGIS();
};

function initGIS(){
    if(typeof google==='undefined'||!google.accounts){setTimeout(initGIS,300);return;}
    gisTokenClient=google.accounts.oauth2.initTokenClient({
        client_id:GIS_CLIENT_ID,
        scope:GIS_SCOPES,
        callback:r=>{
            if(r.access_token){
                sheetsToken=r.access_token;
                localStorage.setItem('gis_sheets_token',sheetsToken);
                console.log('GIS: Sheets token obtained');
            }
        }
    });
    console.log('GIS: Token client initialized');
}

async function handleGoogleLogin(){
    const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+window.location.pathname,queryParams:{access_type:'offline',prompt:'consent'}}});
    if(error){const e=document.getElementById('login-error');e.textContent='ログイン失敗: '+error.message;e.style.display='block';}
}
async function checkRole(u){
    try{
        const{data,error}=await sb.from(T.ROLES).select('name,role').eq('email',u.email).single();
        if(error||!data){await sb.auth.signOut();const e=document.getElementById('login-error');e.textContent=`アクセス拒否。\n${u.email} は許可されていません。`;e.style.display='block';showAuth('login');return;}
        user={email:u.email,name:data.name||u.email,role:data.role,isAdmin:data.role==='admin'};
        document.getElementById('user-chip').innerHTML=`${esc(user.name)}<span class="rt">${user.role}</span>`;
        document.getElementById('bar-right').style.display='flex';
        await loadAll();
        nav('folders');
    }catch(e){console.error(e);showAuth('login');}
}
async function handleLogout(){await sb.auth.signOut();user=null;folders=[];templates=[];generatedLists=[];partsCache=null;sheetsToken=null;localStorage.removeItem('gis_sheets_token');document.getElementById('bar-right').style.display='none';}
function showAuth(v){
    document.getElementById('loading-section').style.display=v==='loading'?'block':'none';
    document.getElementById('login-section').style.display=v==='login'?'block':'none';
    ['v-folders','v-folder','v-tpl-editor','v-print'].forEach(id=>document.getElementById(id).style.display='none');
}

// =====================================================
// DATA LOADING
// =====================================================
async function loadAll(){
    const[f,t,g]=await Promise.all([
        sb.from(T.FOLDERS).select('*').order('sort_order'),
        sb.from(T.TEMPLATES).select('*').order('created_at'),
        sb.from(T.GENERATED).select('*').order('created_at',{ascending:false})
    ]);
    folders=f.data||[];templates=t.data||[];generatedLists=g.data||[];
}
async function loadParts(){
    if(partsCache)return;
    partsCache={};
    const{data}=await sb.from(T.PARTS).select('pn,name,location,temp_location');
    if(data)data.forEach(p=>{partsCache[p.pn]=p;});
}

// =====================================================
// SEGMENT CALC
// =====================================================
function suggestSegs(len){
    const tgt=Math.round(len*100);let best=null,bc=Infinity;
    for(let n15=Math.floor(tgt/150);n15>=0;n15--)for(let n10=Math.floor((tgt-n15*150)/100);n10>=0;n10--){
        const rem=tgt-n15*150-n10*100;if(rem>=0&&rem%25===0){const n025=rem/25,tot=n15+n10+n025;if(tot<bc){bc=tot;best={1.5:n15,1:n10,0.25:n025};}}}
    return best||{1.5:0,1:0,0.25:0};
}
function evalF(formula,params,lookups){
    try{
        // Resolve ALL LOOKUP(tableName) calls within the formula
        let f=formula.replace(/LOOKUP\((\w+)\)/g,(match,tblName)=>{
            if(!lookups||!lookups[tblName]||!lookups[tblName].data)return '0';
            const tbl=lookups[tblName];
            const keys=(tbl.keys||[]).map(k=>params[k]);
            const key=keys.join('/');
            const val=tbl.data[key];
            return typeof val==='number'?String(val):String(parseFloat(val)||0);
        });
        // Replace segment/length variables
        const s=params.segments||{0.25:0,1:0,1.5:0},ts=s[0.25]+s[1]+s[1.5];
        f=f.replace(/SEGS/g,ts).replace(/S025/g,s[0.25]).replace(/S100/g,s[1]).replace(/S150/g,s[1.5]).replace(/LENGTH/g,params.length||0).replace(/CABLE/g,params.cableLength||0);
        return Math.round(Function('"use strict";return ('+f+')')());
    }catch(e){return 0;}
}
function resolveTemplate(tpl,params){
    const segs=suggestSegs(params.length||0);params.segments=segs;
    const lookups=tpl.lookups||{};
    const resolved=[];
    (tpl.sections||[]).forEach(sec=>{
        const items=[];
        (sec.items||[]).forEach(item=>{
            let pn=item.pn;let qty=item.qty||0;
            if(item.switchField&&item.switchMap){try{const map=typeof item.switchMap==='string'?JSON.parse(item.switchMap):item.switchMap;const val=params[item.switchField];if(map[val])pn=map[val];}catch(e){}}
            if(item.formula)qty=evalF(item.formula,params,lookups);
            // Skip zero-qty items in AUTO sections (unused parts)
            if(sec.badge==='auto'&&qty===0)return;
            items.push({pn,qty,comment:item.comment||''});
        });
        // Skip entire section if empty after filtering
        if(items.length)resolved.push({name:sec.name,badge:sec.badge,items});
    });
    return{sections:resolved,segments:segs};
}
function parseSpec(spec){
    const p=spec.trim().split('/').map(s=>s.trim());if(p.length<2)return null;
    const length=parseFloat(p[0]);if(isNaN(length)||length<=0)return null;
    return{length,asmType:p[1].toUpperCase()==='MR'?'MR':'STD',cableLength:p[2]?parseFloat(p[2].replace(/m$/i,''))||0:0};
}

async function addFolder(){
    const name=prompt('フォルダ名:');if(!name)return;
    const icon=prompt('アイコン (絵文字):','📁')||'📁';
    try{const{data,error}=await sb.from(T.FOLDERS).insert({name,icon,sort_order:folders.length+1}).select('*').single();
    if(error)throw error;folders.push(data);renderFolders();}catch(e){alert('エラー: '+e.message);}
}
async function editFolder(id){
    const f=folders.find(f=>f.id===id);if(!f)return;
    const name=prompt('フォルダ名:',f.name);if(!name)return;
    const icon=prompt('アイコン:',f.icon)||f.icon;
    try{const{error}=await sb.from(T.FOLDERS).update({name,icon}).eq('id',id);
    if(error)throw error;f.name=name;f.icon=icon;renderFolders();}catch(e){alert('エラー: '+e.message);}
}
async function delFolder(id){
    const tc=templates.filter(t=>t.folder_id===id).length;
    const gc=generatedLists.filter(g=>g.folder_id===id).length;
    if(tc||gc){alert(`このフォルダには ${tc}テンプレート、${gc}リスト があります。先に中身を削除してください。`);return;}
    if(!confirm('このフォルダを削除しますか？'))return;
    try{const{error}=await sb.from(T.FOLDERS).delete().eq('id',id);
    if(error)throw error;folders=folders.filter(f=>f.id!==id);renderFolders();}catch(e){alert('エラー: '+e.message);}
}

function renderFolder(){
    const el=document.getElementById('v-folder');el.style.display='block';

    if(!f){el.innerHTML='<div class="card empty">フォルダが見つかりません</div>';return;}
    const tpls=templates.filter(t=>t.folder_id===f.id);
    const gens=generatedLists.filter(g=>g.folder_id===f.id);

    // Detect if templates need rail spec (have AUTO sections with formulas)
    const hasRailTpl=tpls.some(t=>(t.sections||[]).some(s=>s.badge==='auto'&&(s.items||[]).some(i=>i.formula&&!i.formula.startsWith('LOOKUP')&&/SEGS|S025|S100|S150|LENGTH|CABLE/.test(i.formula))));

    let quickHtml='';
    if(tpls.length){
        if(hasRailTpl){
            // Rail template — spec input required
            quickHtml=`<div class="quick-box no-print"><h3>⚡ クイック生成</h3>
                <div class="quick-row"><input type="text" id="quick-input" placeholder="3.5/STD/10m" onkeydown="if(event.key==='Enter')quickGen()"><button class="btn btn-g" onclick="quickGen()">生成</button></div>
                <details style="margin-top:8px"><summary style="font-size:.82rem;color:var(--t2);cursor:pointer">📋 一括生成</summary>
                    <textarea id="batch-input" class="batch-area" placeholder="3.5/STD/10m&#10;3.25/MR/8m" style="margin-top:8px"></textarea>
                    <button class="btn btn-g btn-sm" onclick="batchGen()" style="margin-top:6px">一括生成</button></details>
                <div class="quick-hint">形式: 長さ/タイプ(STD|MR)/ケーブル長</div><div class="status" id="quick-status"></div></div>`;
        } else {
            // Fixed/Manual template — no spec needed, simple generate
            quickHtml=`<div class="quick-box no-print"><h3>⚡ リスト生成</h3>
                <div class="quick-row"><input type="text" id="quick-name" placeholder="リスト名 (例: ECN対応 #34)" style="border-color:var(--grn)"><button class="btn btn-g" onclick="directGen()">生成</button></div>
                <div class="quick-hint">リスト名を入力して生成 (仕様入力は不要)</div><div class="status" id="quick-status"></div></div>`;
        }
    }

    let tplHtml=tpls.map(t=>{
        const sc=(t.sections||[]).length,ic=(t.sections||[]).reduce((s,sec)=>s+(sec.items||[]).length,0);
        return`<div class="li" onclick="nav('tpl-editor',{tplId:${t.id}})"><div class="li-info"><h3>${esc(t.name)}</h3><p><span class="tag tag-tpl">テンプレート</span>${sc}セクション ・ ${ic}アイテム</p></div>
            <div class="li-acts" onclick="event.stopPropagation()">${user.isAdmin?`<button class="btn btn-s btn-sm" onclick="nav('tpl-editor',{tplId:${t.id}})">✏️ 編集</button><button class="btn btn-d btn-sm" onclick="delTpl(${t.id})">🗑️</button>`:`<button class="btn btn-s btn-sm" onclick="nav('tpl-editor',{tplId:${t.id}})">👁️ 表示</button>`}</div></div>`;
    }).join('');
    if(!tpls.length)tplHtml=`<div style="text-align:center;padding:16px;color:var(--t3)">${user.isAdmin?'<button class="btn btn-g btn-sm" onclick="nav(\'tpl-editor\')">＋ テンプレート作成</button>':'テンプレートがありません'}</div>`;

    let genHtml=gens.length?gens.map(g=>{
        const cnt=(g.sections||[]).reduce((s,sec)=>s+(sec.items||[]).length,0);
        const created=g.created_at?new Date(g.created_at).toLocaleDateString('ja-JP'):'';
        return`<div class="li" onclick="openPrint(${g.id})"><div class="li-info"><h3>${esc(g.name)}</h3><p><span class="tag tag-gen">生成済</span>${g.spec?`<span class="tag tag-spec">${esc(g.spec)}</span>`:''}${cnt}点 ・ ${created}</p></div>
            <div class="li-acts" onclick="event.stopPropagation()"><button class="btn btn-s btn-sm" onclick="openPrint(${g.id})">🖨️</button><button class="btn btn-d btn-sm" onclick="delGen(${g.id})">🗑️</button></div></div>`;
    }).join(''):'<div style="text-align:center;padding:16px;color:var(--t3);font-size:.85rem">クイック生成で仕様を入力してください</div>';

    el.innerHTML=`${quickHtml}
        <div class="card"><div class="shdr"><h2>📐 テンプレート</h2>${user.isAdmin?`<button class="btn btn-g btn-sm" onclick="nav('tpl-editor')">＋ 新規</button>`:''}</div>${tplHtml}</div>
        <div class="card"><div class="shdr"><h2>📄 生成済みリスト</h2></div>${genHtml}</div>`;
}

async function delTpl(id){if(!confirm('テンプレートを削除しますか？'))return;try{await sb.from(T.TEMPLATES).delete().eq('id',id);}catch(e){alert('削除エラー: '+e.message);return;}templates=templates.filter(t=>t.id!==id);renderFolder();}
async function delGen(id){if(!confirm('削除しますか？'))return;try{await sb.from(T.GENERATED).delete().eq('id',id);}catch(e){alert('削除エラー: '+e.message);return;}generatedLists=generatedLists.filter(g=>g.id!==id);renderFolder();}

// Direct generate for fixed/manual templates (no rail spec)
async function directGen(){
    const nameInput=document.getElementById('quick-name');
    const name=(nameInput?nameInput.value.trim():'')||`リスト ${new Date().toLocaleDateString('ja-JP')}`;
    const tpl=templates.find(t=>t.folder_id===currentFolderId);
    if(!tpl){showSt('quick-status','テンプレートがありません','error');return;}
    showSt('quick-status','生成中...','loading');
    // Resolve template with empty params (no rail logic)
    const sections=(tpl.sections||[]).map(sec=>{
        const items=(sec.items||[]).map(item=>({pn:item.pn||'',qty:item.qty||1,comment:item.comment||''}));
        return{name:sec.name,badge:sec.badge,items};
    });
    const{data,error}=await sb.from(T.GENERATED).insert({
        template_id:tpl.id,folder_id:currentFolderId,name,spec:'',
        params:{},segments:{},sections,created_by:user.name
    }).select('*').single();
    if(error){showSt('quick-status','エラー: '+error.message,'error');return;}
    generatedLists.unshift(data);
    if(nameInput)nameInput.value='';
    showSt('quick-status',`✅ "${name}" を生成しました`,'success');
    setTimeout(()=>{hideSt('quick-status');renderFolder();},800);
}

// =====================================================
// QUICK / BATCH GENERATE
// =====================================================
async function quickGen(){
    const input=document.getElementById('quick-input').value.trim();
    if(!input){showSt('quick-status','仕様を入力してください','error');return;}
    const tpl=templates.find(t=>t.folder_id===currentFolderId);
    if(!tpl){showSt('quick-status','テンプレートがありません','error');return;}
    const params=parseSpec(input);
    if(!params){showSt('quick-status','形式エラー: 3.5/STD/10m','error');return;}
    showSt('quick-status','生成中...','loading');
    const result=resolveTemplate(tpl,params);
    const name=`${tpl.name.replace('Template','').trim()} ${params.length}m ${params.asmType}`;
    const{data,error}=await sb.from(T.GENERATED).insert({
        template_id:tpl.id,folder_id:currentFolderId,name,spec:input,
        params,segments:result.segments,sections:result.sections,created_by:user.name
    }).select('*').single();
    if(error){showSt('quick-status','エラー: '+error.message,'error');return;}
    generatedLists.unshift(data);
    document.getElementById('quick-input').value='';
    showSt('quick-status',`✅ "${name}" を生成しました`,'success');
    setTimeout(()=>{hideSt('quick-status');renderFolder();},800);
}

async function batchGen(){
    const lines=(document.getElementById('batch-input').value||'').split('\n').map(l=>l.trim()).filter(l=>l);
    if(!lines.length)return;
    const tpl=templates.find(t=>t.folder_id===currentFolderId);
    if(!tpl){showSt('quick-status','テンプレートがありません','error');return;}
    showSt('quick-status','一括生成中...','loading');
    let ok=0,fail=0;
    for(const spec of lines){
        const params=parseSpec(spec);
        if(!params){fail++;continue;}
        const result=resolveTemplate(tpl,params);
        const name=`${tpl.name.replace('Template','').trim()} ${params.length}m ${params.asmType}`;
        const{data,error}=await sb.from(T.GENERATED).insert({
            template_id:tpl.id,folder_id:currentFolderId,name,spec,
            params,segments:result.segments,sections:result.sections,created_by:user.name
        }).select('*').single();
        if(error){fail++;}else{generatedLists.unshift(data);ok++;}
    }
    document.getElementById('batch-input').value='';
    showSt('quick-status',fail?`✅ ${ok}件生成、❌ ${fail}件エラー`:`✅ ${ok}件すべて生成`,(fail?'error':'success'));
    setTimeout(()=>{hideSt('quick-status');renderFolder();},1000);
}

// TEMPLATE EDITOR
// =====================================================
function renderTplEditor(){
    const el=document.getElementById('v-tpl-editor');el.style.display='block';
    if(currentTplId){
        const orig=templates.find(t=>t.id===currentTplId);
        editTpl=JSON.parse(JSON.stringify(orig));
    }else{
        editTpl={id:null,folder_id:currentFolderId,name:'',lookups:{},sections:[{name:'Section 1',badge:'manual',items:[{pn:'',formula:'',qty:1,comment:''}]}]};
    }
    if(!editTpl.lookups)editTpl.lookups={};
    renderTplContent();
}
function renderTplContent(){
    const el=document.getElementById('v-tpl-editor');
    const readOnly=!user.isAdmin;

    // Lookup tables UI
    const lookups=editTpl.lookups||{};
    let lookupsHtml='';
    const lookupNames=Object.keys(lookups);
    if(lookupNames.length||!readOnly){

        // Group lookups by prefix (sep_025,sep_075 → sep group)
        const groups={};const standalone=[];
        lookupNames.forEach(name=>{
            const m=name.match(/^([a-z]+)_(\d+)$/);
            if(m){const prefix=m[1];if(!groups[prefix])groups[prefix]=[];groups[prefix].push(name);}
            else standalone.push(name);
        });

        let tablesHtml='';

        // Render grouped tables (separator plates etc)
        Object.entries(groups).forEach(([prefix,names])=>{
            names.sort();
            // Get column labels from lookup labels
            const cols=names.map(n=>{const tbl=lookups[n];const label=(tbl.label||n).replace(/\(qty\)/i,'').trim();return{name:n,label};});
            // Collect all unique keys
            const allKeys=new Set();
            names.forEach(n=>{Object.keys(lookups[n].data||{}).forEach(k=>allKeys.add(k));});
            const sortedKeys=[...allKeys].sort((a,b)=>{
                const na=parseFloat(a),nb=parseFloat(b);
                if(!isNaN(na)&&!isNaN(nb))return na-nb;
                return a.localeCompare(b);
            });
            // Only show non-zero rows? No, show all for editing
            let rowsHtml=sortedKeys.map(k=>{
                let totalPlates=0;
                const cells=cols.map(col=>{
                    const val=lookups[col.name].data[k]||0;
                    totalPlates+=val;
                    if(readOnly)return`<td style="text-align:center;font-weight:${val?'700':'400'};color:${val?'var(--t1)':'#ccc'}">${val}</td>`;
                    return`<td style="text-align:center"><input type="number" value="${val}" min="0" style="width:50px;text-align:center;font-weight:600;padding:3px;border:1.5px solid var(--brd);border-radius:4px" onchange="editTpl.lookups['${col.name}'].data['${k}']=parseInt(this.value)||0;renderTplContent()"></td>`;
                }).join('');
                const screws=totalPlates*2;
                return`<tr><td><code style="font-size:.82rem;font-weight:600">${esc(k)}</code></td>${cells}<td style="text-align:center;font-weight:700;color:var(--pri)">${totalPlates}</td><td style="text-align:center;font-weight:700;color:var(--grn)">${screws}</td></tr>`;
            }).join('');

            const groupLabel=prefix==='sep'?'Rail Separator Plates':prefix.toUpperCase();
            tablesHtml+=`<div class="rule-card" style="margin-bottom:12px">
                <div class="rule-header"><span style="font-weight:700;font-size:.85rem">📊 ${groupLabel}</span><span style="font-size:.72rem;color:var(--t3);margin-left:8px">Formulas: ${names.map(n=>'LOOKUP('+n+')').join(', ')}</span></div>
                <div class="rule-body"><div style="overflow-x:auto">
                    <table class="stbl"><thead><tr><th>Length/Type</th>${cols.map(c=>`<th style="text-align:center">${esc(c.label)}</th>`).join('')}<th style="text-align:center;color:var(--pri)">Total</th><th style="text-align:center;color:var(--grn)">Screws</th></tr></thead>
                    <tbody>${rowsHtml}</tbody></table></div>
                    ${readOnly?'':`<div style="display:flex;gap:6px;margin-top:8px;align-items:center">
                        <input type="text" id="lk-grp-key-${prefix}" placeholder="例: 5.75/MR" style="flex:1;padding:5px 8px;border:1.5px solid var(--brd);border-radius:6px;font-size:.83rem;font-family:monospace">
                        <button class="btn btn-s btn-sm" onclick="addGroupRow('${prefix}')">＋ 行を追加</button>
                    </div>`}
                </div></div>`;
        });

        // Render standalone lookups (cc_links, cc_length_mm) as pivot tables
        standalone.forEach(name=>{
            const tbl=lookups[name];
            const keys=tbl.keys||[];
            const data=tbl.data||{};
            const hasTwoKeys=keys.length>=2;

            if(hasTwoKeys){
                // Pivot: rows = first key (length), cols = second key values (STD, MR)
                const rowKeys=new Set();const colKeys=new Set();
                Object.keys(data).forEach(k=>{const p=k.split('/');rowKeys.add(p[0]);if(p[1])colKeys.add(p[1]);});
                const sortedRows=[...rowKeys].sort((a,b)=>parseFloat(a)-parseFloat(b));
                const sortedCols=[...colKeys].sort();

                let rowsHtml=sortedRows.map(rk=>{
                    const cells=sortedCols.map(ck=>{
                        const key=rk+'/'+ck;const val=data[key];
                        if(readOnly)return`<td style="text-align:center;font-weight:600">${val!==undefined?val:'-'}</td>`;
                        return`<td style="text-align:center"><input type="number" value="${val||0}" style="width:70px;text-align:center;font-weight:600;padding:3px;border:1.5px solid var(--brd);border-radius:4px" onchange="editTpl.lookups['${name}'].data['${rk+'/'+ck}']=parseFloat(this.value)||0"></td>`;
                    }).join('');
                    return`<tr><td><code style="font-size:.82rem;font-weight:600">${esc(rk)}m</code></td>${cells}</tr>`;
                }).join('');

                tablesHtml+=`<div class="rule-card" style="margin-bottom:12px">
                    <div class="rule-header">
                        <span style="font-weight:700;font-size:.85rem">📊 ${esc(tbl.label||name)}</span>
                        <span style="font-size:.72rem;color:var(--t3);margin-left:8px">Formula: LOOKUP(${name})</span>
                        ${readOnly?'':`<button class="dbtn" onclick="delete editTpl.lookups['${name}'];renderTplContent()" style="margin-left:8px">🗑️</button>`}
                    </div>
                    <div class="rule-body"><div style="overflow-x:auto">
                        <table class="stbl"><thead><tr><th>Length</th>${sortedCols.map(c=>`<th style="text-align:center">${esc(c)}</th>`).join('')}</tr></thead>
                        <tbody>${rowsHtml}</tbody></table></div>
                        ${readOnly?'':`<div style="display:flex;gap:6px;margin-top:8px">
                            <input type="text" id="lk-key-${name}" placeholder="${keys.join('/')}" style="flex:1;padding:5px 8px;border:1.5px solid var(--brd);border-radius:6px;font-size:.83rem;font-family:monospace">
                            <input type="text" id="lk-val-${name}" placeholder="値" style="width:80px;padding:5px 8px;border:1.5px solid var(--brd);border-radius:6px;font-size:.83rem;text-align:center">
                            <button class="btn btn-s btn-sm" onclick="addLookupEntry('${name}')">＋</button>
                        </div>`}
                    </div></div>`;
            } else {
                // Simple key→value list
                const entries=Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0]));
                let rowsHtml=entries.map(([k,v])=>`<tr>
                    <td><code style="font-size:.8rem">${esc(k)}</code></td>

// CSV Import for sections
let csvTargetSection=-1;
function triggerCsvImport(si){
    csvTargetSection=si;
    let inp=document.getElementById('csv-file-input');
    if(!inp){inp=document.createElement('input');inp.type='file';inp.id='csv-file-input';inp.accept='.csv,.tsv,.txt';inp.style.display='none';inp.onchange=handleCsvFile;document.body.appendChild(inp);}
    inp.value='';inp.click();
}
function handleCsvFile(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
        const text=ev.target.result;
        const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
        if(!lines.length)return;
        const si=csvTargetSection;
        if(si<0||!editTpl.sections[si])return;
        const sec=editTpl.sections[si];
        const isAuto=sec.badge==='auto';
        let added=0;
        lines.forEach(line=>{
            // Auto-detect: tab, comma, or space separated
            let cols;
            if(line.includes('\t'))cols=line.split('\t');
            else if(line.includes(','))cols=line.split(',');
            else cols=line.split(/\s{2,}/); // 2+ spaces
            cols=cols.map(c=>c.trim());
            if(!cols[0])return;
            if(isAuto){
                // CSV: P/N, Formula, Comment, SwitchMap
                sec.items.push({pn:cols[0]||'',formula:cols[1]||'',comment:cols[2]||'',switchField:cols[3]?'asmType':'',switchMap:cols[3]||''});
            }else{
                // CSV: P/N, Qty, Comment
                sec.items.push({pn:cols[0]||'',qty:parseInt(cols[1])||1,comment:cols[2]||''});
            }
            added++;
        });
        renderTplContent();
        alert(`✅ ${added}行を取り込みました`);
    };
    reader.readAsText(file);
}
function addLookupEntry(name){
    const keyInput=document.getElementById('lk-key-'+name);
    const valInput=document.getElementById('lk-val-'+name);
    if(!keyInput||!valInput)return;
    const key=keyInput.value.trim();const valRaw=valInput.value.trim();
    if(!key||!valRaw)return;
    const val=isNaN(valRaw)?valRaw:parseFloat(valRaw);
    editTpl.lookups[name].data[key]=val;
    keyInput.value='';valInput.value='';
    renderTplContent();
}
function addGroupRow(prefix){
    const keyInput=document.getElementById('lk-grp-key-'+prefix);
    if(!keyInput)return;
    const key=keyInput.value.trim();
    if(!key)return;
    // Add key with 0 value to all tables in the group
    Object.keys(editTpl.lookups).forEach(name=>{
        if(name.startsWith(prefix+'_')){
            editTpl.lookups[name].data[key]=0;
        }
    });
    keyInput.value='';
    renderTplContent();
}

// Silent GIS re-auth (no popup, no login screen)
function gisReAuth(){
    return new Promise((resolve,reject)=>{
        if(!gisTokenClient){reject(new Error('GIS未初期化。ページをリロードしてください。'));return;}
        let done=false;
        const origCb=gisTokenClient.callback;
        gisTokenClient.callback=r=>{
            if(done)return;done=true;
            gisTokenClient.callback=origCb;
            if(r.access_token){sheetsToken=r.access_token;localStorage.setItem('gis_sheets_token',sheetsToken);resolve();}
            else{reject(new Error('トークン取得失敗'));}
        };
        gisTokenClient.requestAccessToken({prompt:''});
        setTimeout(()=>{if(!done){done=true;gisTokenClient.callback=origCb;reject(new Error('Re-auth timeout'));}},15000);
    });
}

// Request Sheets token (with popup for first time)
function gisRequestToken(){
    if(!gisTokenClient){alert('Google認証の準備中。数秒後に再試行してください。');return;}
    gisTokenClient.requestAccessToken();
}

async function reqSheetsApi(url,options={},isRetry=false){
    if(!sheetsToken)sheetsToken=localStorage.getItem('gis_sheets_token');
    if(!sheetsToken){
        // First time — need user interaction to get token
        throw new Error('NEEDS_GIS_AUTH');
    }
    const r=await fetch(url,{...options,headers:{'Authorization':'Bearer '+sheetsToken,'Content-Type':'application/json',...(options.headers||{})}});
    if(r.status===401&&!isRetry){
        // Silent re-auth — no popup needed!
        try{await gisReAuth();return reqSheetsApi(url,options,true);}catch(e){
            sheetsToken=null;localStorage.removeItem('gis_sheets_token');
            throw new Error('NEEDS_GIS_AUTH');
        }
    }
    if(!r.ok){const t=await r.text();throw new Error(`Sheets API error ${r.status}: ${t}`);}
    return r.json();
}

    const sid=getReqSheetId();
    await reqSheetsApi(`https://sheets.googleapis.com/v4/spreadsheets/${sid}:batchUpdate`,{method:'POST',body:JSON.stringify({requests:[{addSheet:{properties:{title:name}}}]})});
    await reqSheetsApi(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(name)}!A1:Q1?valueInputOption=RAW`,{method:'PUT',body:JSON.stringify({values:[['No.','日付','名前','部品番号かQRの値を入力','部品番号(自動入力)','部品名(自動入力)','数量','目的','SN','備考欄','出庫者','処理状況','貸出状況','保管場所','仮保管場所','部署','出庫メモ']]})});
}
async function reqGetNextRow(name){
    const sid=getReqSheetId();
    const d=await reqSheetsApi(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(name)}!B:B`);
    return(d.values?d.values.length:0)+1;
}
async function reqWriteRow(name,row,data){
    const sid=getReqSheetId();
    await reqSheetsApi(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(name)}!B${row}:Q${row}?valueInputOption=USER_ENTERED`,{method:'PUT',body:JSON.stringify({values:[data]})});
}

async function reqSubmit(){
    const items=window._printItems||[];
    const selected=reqSelection.filter(i=>!reqExcluded.has(i)).map(i=>items[i]).filter(Boolean);
    if(!selected.length){showSt('req-status','部品を選択してください','error');return;}
    const purpose=document.getElementById('req-purpose').value;
    if(!purpose){showSt('req-status','目的を選択してください','error');return;}
    const sn=document.getElementById('req-sn').value.trim();

    showSt('req-status','送信中...','loading');
    try{
        const sheet=getReqSheetName();
        if(!(await reqCheckSheet(sheet)))await reqCreateSheet(sheet);
        let row=await reqGetNextRow(sheet);
        const date=`${new Date().getMonth()+1}/${new Date().getDate()}`;
        for(let i=0;i<selected.length;i++){
            const p=selected[i];
            // Use template comment per row (from the list)
            await reqWriteRow(sheet,row+i,[date,user.name,p.pn||'','','',String(p.qty||1),purpose,sn||'',p.comment||'']);
        }
        showSt('req-status',`✅ ${selected.length}件の出庫依頼を送信しました`,'success');
        setTimeout(()=>{reqSelection=[];regenPrint();},2000);
    }catch(e){
        console.error(e);
        if(e.message==='NEEDS_GIS_AUTH'){
            showSt('req-status','📋 Google Sheets認証が必要です','error');
            const statusEl=document.getElementById('req-status');
            if(statusEl)statusEl.innerHTML+='<br><button onclick="gisRequestToken()" style="margin-top:8px;padding:8px 16px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">🔑 Google Sheets認証</button>';
        }else{
            showSt('req-status','エラー: '+e.message,'error');
        }
    }
}

// HELPERS

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showSt(id,m,t){const e=document.getElementById(id);if(!e)return;e.textContent=m;e.className='status '+t;}
function hideSt(id){const e=document.getElementById(id);if(e)e.className='status';}

// =====================================================
// UNIT S/N MODAL (for requisition panel)
// =====================================================
const GHOST_TRACKER_SHEET_ID='1mUhNDzucbHpS2y-IYu3A5ML1x5I_opUeNnqqyOtg95M';
const REQ_UNIT_CODES=[
    {code:'Ghost',snCode:'GST',sheetTab:'00_GHOST'},{code:'MB',snCode:'MBB',sheetTab:'05_Mobile Base'},
    {code:'Pillar',snCode:'PLR',sheetTab:'06_Pillar'},{code:'H&B',snCode:'HBD',sheetTab:'07_Head & Body'},
    {code:'Arm',snCode:'ARM',sheetTab:'09_Arm'},{code:'Gripper',snCode:'GPR',sheetTab:'08_Gripper'},
    {code:'DK',snCode:'DPK',sheetTab:'10_Deploy Kit'},{code:'L-Mot',snCode:'LAC',sheetTab:'01_L-motor'},
    {code:'A12',snCode:'A12',sheetTab:'02_A12-motor'},{code:'A35',snCode:'A35',sheetTab:'03_A35-motor'},
    {code:'A4',snCode:'A4A',sheetTab:'04_A4-motor'}
];
let reqUnitCode='',reqUnitNumber='';

function openReqUnitModal(){
    reqUnitCode='';reqUnitNumber='';
    const numIn=document.getElementById('req-unit-number');if(numIn)numIn.value='';
    document.querySelectorAll('#req-unit-chips .req-unit-chip').forEach(c=>c.classList.remove('active'));
    updateReqUnitPreview();
    document.getElementById('req-unit-modal').classList.add('active');
}
function closeReqUnitModal(){document.getElementById('req-unit-modal').classList.remove('active');}
function selectReqUnit(code){
    reqUnitCode=code;
    document.querySelectorAll('#req-unit-chips .req-unit-chip').forEach(c=>c.classList.toggle('active',c.dataset.code===code));
    updateReqUnitPreview();
}
function updateReqUnitPreview(){
    reqUnitNumber=(document.getElementById('req-unit-number')||{}).value||'';
    reqUnitNumber=reqUnitNumber.trim();
    const btn=document.getElementById('req-unit-confirm');if(!btn)return;
    if(reqUnitCode&&reqUnitNumber){
        const uc=REQ_UNIT_CODES.find(u=>u.code===reqUnitCode);
        btn.textContent=`✅ ${uc?uc.snCode:reqUnitCode}-${reqUnitNumber.padStart(5,'0')}`;btn.disabled=false;
    }else if(reqUnitCode){btn.textContent='番号を入力してください';btn.disabled=true;}
    else{btn.textContent='Unitを選択してください';btn.disabled=true;}
}
async function confirmReqUnit(){
    if(!reqUnitCode||!reqUnitNumber)return;
    const btn=document.getElementById('req-unit-confirm');
    const uc=REQ_UNIT_CODES.find(u=>u.code===reqUnitCode);
    const fallbackSN=uc?`${uc.snCode}-${reqUnitNumber.padStart(5,'0')}`:`${reqUnitCode}-${reqUnitNumber}`;

    btn.textContent='🔍 検索中...';btn.disabled=true;
    try{
        const fullSN=await lookupGhostSN(reqUnitCode,reqUnitNumber);
        if(fullSN){
            const snIn=document.getElementById('req-sn');if(snIn)snIn.value=fullSN;
            closeReqUnitModal();
        }else{
            const snIn=document.getElementById('req-sn');if(snIn)snIn.value=fallbackSN;
            closeReqUnitModal();
            showSt('req-status',`⚠️ Ghost Trackerに見つかりません。${fallbackSN} を設定`,'error');
        }
    }catch(e){
        console.warn('Ghost Tracker lookup failed:',e);
        const snIn=document.getElementById('req-sn');if(snIn)snIn.value=fallbackSN;
        closeReqUnitModal();
        if(e.message==='NEEDS_GIS_AUTH'){
            showSt('req-status','📋 Google Sheets認証が必要です','error');
            const el=document.getElementById('req-status');
            if(el)el.innerHTML+='<br><button onclick="gisRequestToken()" style="margin-top:6px;padding:6px 14px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">🔑 Google認証</button>';
        }else{
            showSt('req-status',`⚠️ 検索エラー。${fallbackSN} を設定`,'error');
        }
    }
}

async function lookupGhostSN(unitCode,number){
    const uc=REQ_UNIT_CODES.find(u=>u.code===unitCode);
    if(!uc||!uc.sheetTab)return null;
    const data=await reqSheetsApi(`https://sheets.googleapis.com/v4/spreadsheets/${GHOST_TRACKER_SHEET_ID}/values/${encodeURIComponent(uc.sheetTab)}!A:Z`);
    const rows=data.values||[];if(rows.length<2)return null;
    // Find S/N column
    let snCol=rows[0].findIndex(h=>/^S\/?N$/i.test((h||'').trim()));
    if(snCol===-1){outer:for(let ci=0;ci<Math.min(rows[0].length,10);ci++){for(let ri=1;ri<Math.min(rows.length,5);ri++){if(/^GT\d{3}-[A-Z0-9]{2,3}-\d{3,5}$/i.test(rows[ri][ci]||'')){snCol=ci;break outer;}}}}
    if(snCol===-1)snCol=0;
    const pad=number.toString().padStart(5,'0'),snUp=uc.snCode.toUpperCase();
    for(let i=1;i<rows.length;i++){
        const cell=(rows[i][snCol]||'').trim().toUpperCase();
        const m=cell.match(/^(GT\d{3})-([A-Z0-9]{2,3})-(\d{3,5})$/);
        if(m&&m[2]===snUp&&(m[3]===number.toString()||m[3].padStart(5,'0')===pad||parseInt(m[3])===parseInt(number)))return cell;
    }
    return null;
}
</script>

    </div>
</div>
